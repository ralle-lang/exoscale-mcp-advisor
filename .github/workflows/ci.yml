name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lower and upper bounds of the supported range (requires-python >=3.10;
        # the official mcp SDK floor). See docs/mcp-advisor-design.md §1, §8.
        # Kept as the sole matrix axis so the check contexts stay test (3.10) /
        # test (3.13); the connector floor/latest split is done in steps below.
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev dependencies (latest connector)
        run: pip install -e '.[dev]'
      - name: Show resolved connector version (latest)
        run: python -c "import importlib.metadata as m; print('exoscale-connector', m.version('exoscale-connector'))"
      - name: Lint
        run: ruff check src tests
      - name: Type-check
        run: mypy src
      - name: Unit tests (latest connector)
        run: pytest tests/unit -q
      # Re-run the suite against the declared exoscale-connector floor so a floor
      # set too low fails the build mechanically (design §16). The floor is parsed
      # from the quoted dependency literal in pyproject.toml — single source, no
      # duplicated pin to drift.
      - name: Downgrade to the declared exoscale-connector floor
        run: |
          floor=$(grep -oE '"exoscale-connector>=[0-9]+(\.[0-9]+)+' pyproject.toml \
            | grep -oE '[0-9]+(\.[0-9]+)+' | head -1)
          test -n "$floor" || { echo "::error::could not parse exoscale-connector floor from pyproject.toml"; exit 1; }
          echo "Installing declared floor exoscale-connector==$floor"
          pip install "exoscale-connector==$floor"
          python -c "import importlib.metadata as m; print('exoscale-connector', m.version('exoscale-connector'))"
      - name: Type-check (connector floor)
        run: mypy src
      - name: Unit tests (connector floor)
        run: pytest tests/unit -q
      # The gated live smoke test (tests/integration) needs live tenant
      # credentials and is deliberately NOT run in CI — see
      # docs/mcp-advisor-design.md §9.
