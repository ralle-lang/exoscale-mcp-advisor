name: Release

# Publishes to PyPI via Trusted Publishing (OIDC — no API token stored) when a
# GitHub Release is published. The trusted publisher on PyPI is configured for
# this workflow filename (release.yml) and the `pypi` environment below. The
# publish step attaches PEP 740 build attestations (provenance). All actions are
# pinned to a commit SHA (with a # vX.Y.Z comment) for supply-chain integrity.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check distribution metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          attestations: true  # PEP 740 build provenance
